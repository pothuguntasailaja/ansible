- name: conditions
  hosts: local
  connection: local
  vars:
    number: 12
  tasks:
  - name: Check number is less than 10 or not
    ansible.builtin.debug:
      msg: "Given number {{ number }} is less than 10"
    when: number < 10  


- name: conditions
  hosts: local
  connection: local
  vars:
   number: 6
  tasks:
  - name: check the number is less than or equal to 10
    ansible.builtin.debug:
      msg: "the number is: {{ number }} less than  10"
    when number < 10  
    
