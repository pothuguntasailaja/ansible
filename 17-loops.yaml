- name: Install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: print names
    ansible.builtin.package:
      name: "{{ item.name }}"
      state:  "{{ item.state }}"
    loop:
     - { name: "nginx", state: "absent"}
     - { name: "mysql", state: "absent"}
     - { name: "zip", state: "latest"}


- name: install and delete packages
  hosts: local
  connection: local
  tasks:
  - name: install packages
    ansible.builtin.package:
       name: "{{ item.name }}"
       state: "{{ item.state }}"
    loops:
      - { name: "nginx", state: "absent"}
      - { name: "mysql", state: "absent"}
      - { name: "zip", state: "latest"}       