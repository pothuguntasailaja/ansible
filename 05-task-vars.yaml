- name: play level variables
  hosts: local
  connection: local # ansible is connecting to local host
  vars:
    COURSE: DEVOPS WITH AWS
    DURATION: 10HRS
    Trainer: Sivakumar
  tasks:
  - name: print the course info
    vars:
      COURSE: ansible
    ansible.builtin.debug:
      msg: "Course Name is: {{ COURSE }}, Duration: {{ DURATION }}, Trainer: {{ Trainer }}"








- name: play level variables
  hosts: local
  connection: local
  vars:
    COURSE: DEVOPS
    TRAINER: SIVA
    DURATION: 10HRS
  tasks:
  - name: print the course info
    vars:
      COURSE: DEVSECOPS
    ansible.builtin.debug:
      msg: "Course name is {{ COURSE }}, Trainer is: {{ TRAINER }}, Duration is {{ DURATION }}"  
