- name: functions
  hosts: local
  connection: local
  vars:
    technologies: Devops, Linux, Ansible, shell
    # dictionary == map
    tags:
      Application: payment
      Enviornment: dev
    # List
    listTags:
      - key: Application
        value: payment
      - key: Enviornment
        value: dev    
  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Ramesh') }}"

# convert Strings to List

  - name: convert String to list
    ansible.builtin.debug:
      msg: "technologies are: {{ technologies | split(',') }}"  

#  convert map to list
  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}"    

#  convert list to map
  - name: convert list to map
    ansible.builtin.debug:
      msg: "Tag are: {{ listTags | items2dict }}"   

#  convert  yaml to json
  - name: read yaml and take it in to variable
    ansible.builtin.set_fact:
       student_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}"

  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json }}"         
