- name: functions
  hosts: local
  connection: local
  vars:
    technologies: Devops, Linux, Ansible, shell
    # dictionary == map
    tags:
      Application: payment
      Enviornment: dev
    # List
    listTags:
      - key: Application
        value: payment
      - key: Enviornment
        value: dev    
  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Ramesh') }}"

# convert Strings to List

  - name: convert String to list
    ansible.builtin.debug:
      msg: "technologies are: {{ technologies | split(',') }}"  

#  convert map to list
  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}"    

#  convert map to list
  - name: convert list to map
    ansible.builtin.debug:
      msg: "Tag are: {{ listTags | items2dict }}"        