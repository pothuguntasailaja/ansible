- name: functions
  hosts: local
  connection: local
  vars:
    technologies: Devops, Linux, Ansible, shell
    name: SAILAJA
    gmail: info@gmail.com
    ipaddress: "192.168.0.1"
    # dictionary == map
    tags:
      Application: payment
      Enviornment: dev
    # List
    listTags:
      - key: Application
        value: payment
      - key: Enviornment
        value: dev    
  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Ramesh') }}"

# convert Strings to List

  - name: convert String to list
    ansible.builtin.debug:
      msg: "technologies are: {{ technologies | split(',') }}"  

#  convert map to list
  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}"    

#  convert list to map
  - name: convert list to map
    ansible.builtin.debug:
      msg: "Tag are: {{ listTags | items2dict }}"   

#  convert  yaml to json
  - name: read yaml and take it in to variable
    ansible.builtin.set_fact:
       student_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}"

  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json }}"    

  - name: save json to file
    ansible.builtin.copy:
      dest: ./student-data.json
      content: "{{ student_yaml | to_nice_json }}"     

  - name: convert to lower case
    ansible.builtin.debug:
      msg: "{{ name | lower }}"

  - name: convert to upper
    ansible.builtin.debug:
      msg: "{{ gmail | upper }}"  

  - name: check the ipadrress valid or not
    ansible.builtin.debug:
      msg: "{{ ipaddress | ansible.utils.ipv4 }}"
          

  - name: grep for root
    ansible.builtin.shell: cat /etc/passwd | grep root
   # ansible.builtin.command: cat /etc/passwd | grep root
    register: command_output

  - name: print the command_output
    ansible.builtin.debug:
      msg: " {{ command_output }}"  

  - name: redirect the output
    ansible.builtin.command: ls -ltr >  /tmp/output.txt
    register: redirect_output
    ignore_errors: true
 

  - name:  print redirect_output
    ansible.builtin.debug:
      msg: " {{ redirect_output }}"

  
  - name: redirect the command_output
    ansible.builtin.shell: ls -ltr > /tmp/output.txt
    register: redirect_output

  - name:  print redirect_output
    ansible.builtin.debug:
      msg: " {{ redirect_output }}"    